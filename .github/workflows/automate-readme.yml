  <g transform="translate(150,232)"><circle cx="0" cy="-7" r="4.5" fill="#F0C0CC" opacity="0.8"/><circle cx="6" cy="3.5" r="4.5" fill="#F0C0CC" opacity="0.8"/><circle cx="-6" cy="3.5" r="4.5" fill="#F0C0CC" opacity="0.8"/><circle cx="0" cy="0" r="5" fill="white" opacity="0.65"/></g>
  <g transform="translate(194,228)"><circle cx="0" cy="-6" r="4" fill="#B8D8E8" opacity="0.8"/><circle cx="5.2" cy="3" r="4" fill="#B8D8E8" opacity="0.8"/><circle cx="-5.2" cy="3" r="4" fill="#B8D8E8" opacity="0.8"/><circle cx="0" cy="0" r="4.5" fill="white" opacity="0.65"/></g>
