name: Automate README

on:
  schedule:
    - cron: "0 6 * * *"   # 8am Tel Aviv
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    name: ☕ Update README content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. Write Tea.svg ─────────────────────────────────────────────────
      - name: Write Tea.svg
        run: |
          mkdir -p assets
          cat > assets/Tea.svg << 'SVGEOF'
