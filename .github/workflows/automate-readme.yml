name: Automate README

on:
  schedule:
    - cron: "0 6 * * *"   # 8am Tel Aviv
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Contribution snake → pushed to `output` branch
  # The snake grows one cell for every contribution dot it eats.
  # Its maximum possible length = your total contributions this year.
  # Commit more → snake gets longer → board fills more before it loops.
  # ─────────────────────────────────────────────────────────────────────────────
  snake:
    name: 🐍 Contribution snake
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=9DC0D8&color_dots[0]=0D1118&color_dots[1]=1A2E48&color_dots[2]=2E4B6B&color_dots[3]=5A8FAF&color_dots[4]=9DC0D8
            dist/github-contribution-grid-snake-dark.svg?color_snake=D4899A&color_dots[0]=0D1118&color_dots[1]=1A2E48&color_dots[2]=2E4B6B&color_dots[3]=5A8FAF&color_dots[4]=D4899A

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Everything that updates the main branch
  # ─────────────────────────────────────────────────────────────────────────────
  update-readme:
    name: ☕ Update README content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. Ensure tea.svg exists in assets/ ────────────────────────────────
      - name: Write tea.svg
        run: |
          mkdir -p assets
          cat > assets/tea.svg << 'SVGEOF'
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 190" width="440" height="190">
  <rect width="440" height="190" fill="#0D1118" rx="18"/>
  <ellipse cx="210" cy="138" rx="78" ry="52" fill="#0F1923" stroke="#5A8FAF" stroke-width="2.5"/>
  <path d="M 288 122 C 314 108 332 93 336 79 C 328 69 314 73 307 81 C 300 96 284 115 276 123 Z" fill="#0F1923" stroke="#5A8FAF" stroke-width="2.5"/>
  <path d="M 132 118 C 104 118 100 136 100 148 C 100 166 113 174 132 171" fill="none" stroke="#5A8FAF" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="210" cy="88" rx="50" ry="12" fill="#0F1923" stroke="#5A8FAF" stroke-width="2.5"/>
  <ellipse cx="210" cy="83" rx="13" ry="8" fill="#9DC0D8"/>
  <path d="M 140 124 Q 210 138 280 124" fill="none" stroke="#D4899A" stroke-width="1.8" opacity="0.6"/>
  <circle cx="190" cy="136" r="3.5" fill="#D4899A" opacity="0.7"/>
  <circle cx="210" cy="143" r="3" fill="#9DC0D8" opacity="0.7"/>
  <circle cx="230" cy="136" r="3.5" fill="#D4899A" opacity="0.7"/>
  <ellipse cx="210" cy="188" rx="72" ry="6" fill="#5A8FAF" opacity="0.08"/>
  <text x="210" y="160" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#F0EAE2" opacity="0.45" letter-spacing="4">L A D Y   F A Y E</text>
  <path d="M 188 76 C 181 58 194 43 187 24" fill="none" stroke="#9DC0D8" stroke-width="3.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="d" values="M 188 76 C 181 58 194 43 187 24;M 188 76 C 175 58 188 43 181 24;M 188 76 C 181 58 194 43 187 24" dur="3.2s" repeatCount="indefinite" begin="0s"/>
  </path>
  <path d="M 210 74 C 218 56 204 41 211 22" fill="none" stroke="#D4899A" stroke-width="3.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite" begin="1.1s"/>
    <animate attributeName="d" values="M 210 74 C 218 56 204 41 211 22;M 210 74 C 223 56 210 41 217 22;M 210 74 C 218 56 204 41 211 22" dur="3.2s" repeatCount="indefinite" begin="1.1s"/>
  </path>
  <path d="M 232 76 C 240 58 226 43 233 24" fill="none" stroke="#9DC0D8" stroke-width="3.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite" begin="2.2s"/>
    <animate attributeName="d" values="M 232 76 C 240 58 226 43 233 24;M 232 76 C 245 58 232 43 239 24;M 232 76 C 240 58 226 43 233 24" dur="3.2s" repeatCount="indefinite" begin="2.2s"/>
  </path>
</svg>
SVGEOF

      # ── 2. Rotate daily quote ───────────────────────────────────────────────
      - name: Rotate quote
        run: |
          python3 - << 'PYEOF'
          import random, re, pathlib, datetime

          quotes = [
              "The question is not whether machines can think — it is whether they can see what we have always seen.",
              "Attribution is not certainty. It is probability, beautifully argued.",
              "Every brushstroke is a decision. Every decision is a signature.",
              "History is pattern recognition at civilisational scale.",
              "The most interesting datasets are the ones nobody thought to digitise.",
              "Neural networks learn features. Art historians learn meaning. The gap between those two things is the research.",
              "If you can describe it precisely enough to argue about it, you can model it.",
              "A Celtic scribe and a backpropagation algorithm are solving the same problem. One of them just knows it.",
              "The world is not lacking in data. It is lacking in questions worth asking of it.",
              "Economics taught me that everything is an optimisation problem. AI is teaching me which ones matter.",
              "You do not need to choose between rigour and beauty. Baroque painters certainly did not.",
              "The pattern holds across centuries. The tooling just got faster.",
          ]

          # deterministic but daily — same quote all day, different each day
          seed = int(datetime.date.today().strftime("%Y%j"))
          random.seed(seed)
          new_quote = f'> *"{random.choice(quotes)}"*'

          readme = pathlib.Path("README.md").read_text()
          updated = re.sub(
              r"<!-- QUOTE:START -->.*?<!-- QUOTE:END -->",
              f"<!-- QUOTE:START -->\n{new_quote}\n<!-- QUOTE:END -->",
              readme,
              flags=re.DOTALL
          )
          pathlib.Path("README.md").write_text(updated)
          print("✅ quote rotated")
          PYEOF

      # ── 3. Auto-update recently active repos ────────────────────────────────
      - name: Update recently active repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, re, pathlib

          token = "${{ secrets.GITHUB_TOKEN }}"
          req = urllib.request.Request(
              "https://api.github.com/users/ladyFaye1998/repos?sort=pushed&per_page=5&type=public",
              headers={"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              repos = json.loads(r.read())

          lines = []
          for repo in repos[:4]:
              name = repo["name"]
              desc = repo.get("description") or ""
              url  = repo["html_url"]
              lang = repo.get("language") or ""
              lang_badge = f" `{lang}`" if lang else ""
              lines.append(f"- **[{name}]({url})**{lang_badge}  \n  {desc}")

          block = "\n".join(lines)

          readme = pathlib.Path("README.md").read_text()
          updated = re.sub(
              r"<!-- REPOS:START -->.*?<!-- REPOS:END -->",
              f"<!-- REPOS:START -->\n{block}\n<!-- REPOS:END -->",
              readme,
              flags=re.DOTALL
          )
          pathlib.Path("README.md").write_text(updated)
          print("✅ repos updated")
          PYEOF

      # ── 4. Commit everything to main ────────────────────────────────────────
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily readme update — tea, quote, repos [skip ci]"
          file_pattern: "README.md assets/tea.svg"
