  <g><path d="M 190 54 C 190 48 182 42 182 50 C 182 58 190 62 190 62 C 190 62 198 58 198 50 C 198 42 190 48 190 54 Z" fill="#9DC0D8"><animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite" begin="1s"/><animateTransform attributeName="transform" type="translate" values="0,0;0,-30;0,-60" dur="3s" repeatCount="indefinite" begin="1s"/></path></g>
