name: Automate README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  # ── Contribution Snake ───────────────────────────────────────────────────────
  # The snake eats each contribution dot and grows longer with every bite.
  # Its max length = your total contributions this year. More commits = longer snake.
  snake:
    name: Generate contribution snake
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=8AAFD4&color_dots[0]=0D1118&color_dots[1]=1B2C4F&color_dots[2]=2A3F6F&color_dots[3]=4A6FA5&color_dots[4]=8AAFD4
            dist/github-contribution-grid-snake-dark.svg?color_snake=C4A8B8&color_dots[0]=0D1118&color_dots[1]=1B2C4F&color_dots[2]=2A3F6F&color_dots[3]=4A6FA5&color_dots[4]=C4A8B8

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Recent Activity Feed ─────────────────────────────────────────────────────
  activity:
    name: Update recent activity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          MAX_LINES: 5
          COMMIT_MSG: "chore: update activity feed"
