  <path d="M 143 178 Q 152 167 161 178" fill="none" stroke="#1A2E48" stroke-width="3.8" stroke-linecap="round"/>
  <circle cx="143" cy="176" r="2.2" fill="#1A2E48"/>
  <circle cx="161" cy="176" r="2.2" fill="#1A2E48"/>
  <path d="M 183 178 Q 192 167 201 178" fill="none" stroke="#1A2E48" stroke-width="3.8" stroke-linecap="round"/>
  <circle cx="183" cy="176" r="2.2" fill="#1A2E48"/>
  <circle cx="201" cy="176" r="2.2" fill="#1A2E48"/>
  <ellipse cx="172" cy="195" rx="5" ry="3.5" fill="#1A2E48" opacity="0.35"/>
  <path d="M 160 208 Q 172 220 184 208" fill="none" stroke="#1A2E48" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="132" cy="196" r="15" fill="#D4899A" opacity="0.35"/>
