SVGEOF

      # ── 2. Generate contribution city ────────────────────────────────────
      - name: Generate contribution city
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, pathlib, math, os

          # Fetch contribution data via GitHub GraphQL
          token = os.environ["GH_TOKEN"]
          query = """
          {
            user(login: "ladyFaye1998") {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """
          req = urllib.request.Request(
              "https://api.github.com/graphql",
              data=json.dumps({"query": query}).encode(),
              headers={"Authorization": f"bearer {token}", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          cal = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]
          total = cal["totalContributions"]
          weeks = [sum(d["contributionCount"] for d in w["contributionDays"]) for w in cal["weeks"]]
          weeks = weeks[-52:]  # last 52 weeks

          # Build isometric city SVG
          TILE_W=18; TILE_H=9; MAX_H=80; MIN_H=4; N=len(weeks)
          BG="#0D1118"; STREET="#111827"
          TIERS=[
              (0,2,"#1A2E48","#0F1E30","#152538"),
              (3,7,"#2E4B6B","#1E3350","#253D5C"),
              (8,14,"#5A8FAF","#3D6B8A","#4A7D9E"),
              (15,22,"#9DC0D8","#7AAEC8","#88B9D0"),
              (23,99,"#D4899A","#B8728A","#C47E91"),
          ]
          def tier_colors(v):
              for lo,hi,t,l,r in TIERS:
                  if lo<=v<=hi: return t,l,r
              return TIERS[-1][2],TIERS[-1][3],TIERS[-1][4]
          def iso_x(c,r): return (c-r)*TILE_W//2
          def iso_y(c,r): return (c+r)*TILE_H//2
          COLS=7
          xs=[iso_x(c%COLS,c//COLS) for c in range(N)]
          ys=[iso_y(c%COLS,c//COLS) for c in range(N)]
          city_x_min=min(xs); city_x_max=max(xs)+TILE_W
          city_y_min=min(ys)-MAX_H; city_y_max=max(ys)+TILE_H
          city_w=city_x_max-city_x_min; city_h=city_y_max-city_y_min
          SVG_W=700; SVG_H=320
          OFF_X=SVG_W//2-(city_x_min+city_w//2)
          OFF_Y=SVG_H//2-(city_y_min+city_h//2)+10
          max_val=max(weeks) if max(weeks)>0 else 1
          els=[]; ground_els=[]; building_els=[]
          for idx in range(N):
              row_i=idx//COLS; col_i=idx%COLS; val=weeks[idx]
              gx=iso_x(col_i,row_i)+OFF_X; gy=iso_y(col_i,row_i)+OFF_Y
              bh=MIN_H if val==0 else int(MIN_H+(val/max_val)*(MAX_H-MIN_H))
              top_c,left_c,right_c=tier_colors(val)
              tw=TILE_W; th=TILE_H
              ground_pts=f"{gx},{gy} {gx+tw//2},{gy+th//2} {gx+tw},{gy} {gx+tw//2},{gy-th//2}"
              ground_els.append(f'<polygon points="{ground_pts}" fill="{STREET}" stroke="{BG}" stroke-width="0.5"/>')
              ty=gy-bh
              top_pts=f"{gx},{ty} {gx+tw//2},{ty+th//2} {gx+tw},{ty} {gx+tw//2},{ty-th//2}"
              left_pts=f"{gx},{ty} {gx},{gy} {gx+tw//2},{gy+th//2} {gx+tw//2},{ty+th//2}"
              right_pts=f"{gx+tw//2},{ty+th//2} {gx+tw//2},{gy+th//2} {gx+tw},{gy} {gx+tw},{ty}"
              building_els.append((row_i,col_i,top_pts,left_pts,right_pts,top_c,left_c,right_c,val,bh,gx,ty))
          building_els.sort(key=lambda x:x[0]*100+x[1])
          for row_i,col_i,top_pts,left_pts,right_pts,top_c,left_c,right_c,val,bh,gx,ty in building_els:
              els.append(f'<polygon points="{left_pts}" fill="{left_c}"/>')
              els.append(f'<polygon points="{right_pts}" fill="{right_c}"/>')
              els.append(f'<polygon points="{top_pts}" fill="{top_c}"/>')
              if val>=8:
                  wx=gx+TILE_W//4; wy=ty+bh//3
                  els.append(f'<circle cx="{wx}" cy="{wy}" r="1.5" fill="{BG}" opacity="0.4"/>')
                  els.append(f'<circle cx="{wx+5}" cy="{wy}" r="1.5" fill="{BG}" opacity="0.4"/>')
              if val>=23:
                  els.append(f'<circle cx="{gx+TILE_W//2}" cy="{ty-2}" r="3" fill="#D4899A" opacity="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="{col_i*0.3}s"/></circle>')
          els.append(f'<text x="{SVG_W//2}" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#5A8FAF" opacity="0.6" letter-spacing="2">CONTRIBUTION CITY - {total} COMMITS THIS YEAR</text>')
          els.append(f'<text x="{SVG_W//2}" y="{SVG_H-10}" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-style="italic" fill="#F0EAE2" opacity="0.3">taller buildings - more commits</text>')
          svg=(f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {SVG_W} {SVG_H}" width="{SVG_W}" height="{SVG_H}">'
               f'<rect width="{SVG_W}" height="{SVG_H}" fill="{BG}" rx="12"/>'
               +"".join(ground_els)+"".join(els)+f'</svg>')
          pathlib.Path("assets/contribution-city.svg").write_text(svg)
          print(f"done - {total} commits, {len(weeks)} weeks")
          PYEOF

      # ── 3. Update recently active repos ──────────────────────────────────
      - name: Update recently active repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, re, pathlib

          token = "${{ secrets.GITHUB_TOKEN }}"
          req = urllib.request.Request(
              "https://api.github.com/users/ladyFaye1998/repos?sort=pushed&per_page=5&type=public",
              headers={"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              repos = json.loads(r.read())

          lines = []
          for repo in repos[:4]:
              name = repo["name"]
              desc = repo.get("description") or ""
              url  = repo["html_url"]
              lang = repo.get("language") or ""
              lang_badge = f" `{lang}`" if lang else ""
              lines.append(f"- **[{name}]({url})**{lang_badge}  \n  {desc}")

          block = "\n".join(lines)
          readme = pathlib.Path("README.md").read_text()
          updated = re.sub(
              r"<!-- REPOS:START -->.*?<!-- REPOS:END -->",
              f"<!-- REPOS:START -->\n{block}\n<!-- REPOS:END -->",
              readme, flags=re.DOTALL
          )
          pathlib.Path("README.md").write_text(updated)
          print("repos updated")
          PYEOF

      # ── 4. Commit everything ─────────────────────────────────────────────
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily readme update [skip ci]"
          file_pattern: "README.md assets/Tea.svg assets/contribution-city.svg"
