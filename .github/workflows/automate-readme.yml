      # ── 2. Generate research-vector.svg ─────────────────────────────────────
      - name: Generate research vector
        run: |
          python3 - << 'PYEOF'
          import pathlib

          # ✏️ Edit these values (0.0–1.0) to reflect current focus
          tracks = [
              ("Machine Learning",       0.90, "#9DC0D8"),
              ("Quantum Computing",      0.65, "#7AAEC8"),
              ("Computational Art",      0.80, "#D4899A"),
              ("Worldbuilding",          0.55, "#B8D8E8"),
              ("Celtic & Med. Studies",  0.40, "#C4A8B8"),
          ]

          W, H = 680, 44 + len(tracks) * 46
          BAR_X, BAR_W = 210, 380
          rows = []
          for i, (label, val, color) in enumerate(tracks):
              y = 28 + i * 46
              fill_w = int(BAR_W * val)
              pct = int(val * 100)
              rows.append(f'<rect x="{BAR_X}" y="{y+10}" width="{BAR_W}" height="14" rx="7" fill="#1A2E48"/>')
              rows.append(f'''<rect x="{BAR_X}" y="{y+10}" width="0" height="14" rx="7" fill="{color}" opacity="0.85">
                <animate attributeName="width" from="0" to="{fill_w}" dur="1.2s" begin="{i*0.15}s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
              </rect>''')
              rows.append(f'<text x="{BAR_X-12}" y="{y+22}" text-anchor="end" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#F0EAE2" opacity="0.75">{label}</text>')
              rows.append(f'<text x="{BAR_X+BAR_W+10}" y="{y+22}" font-family="monospace" font-size="11" fill="{color}" opacity="0.9">{pct}%</text>')

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {W} {H}" width="{W}" height="{H}">
            <rect width="{W}" height="{H}" fill="#0D1118" rx="12"/>
            <text x="20" y="22" font-family="monospace" font-size="11" fill="#5A8FAF" opacity="0.7" letter-spacing="2">RESEARCH VECTOR · CURRENT WEIGHTS</text>
            {"".join(rows)}
          </svg>'''

          pathlib.Path("assets/research-vector.svg").write_text(svg)
          print("✅ research-vector.svg generated")
          PYEOF

      # ── 3. Auto-update recently active repos ────────────────────────────────
      - name: Update recently active repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, re, pathlib

          token = "${{ secrets.GITHUB_TOKEN }}"
          req = urllib.request.Request(
              "https://api.github.com/users/ladyFaye1998/repos?sort=pushed&per_page=5&type=public",
              headers={"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              repos = json.loads(r.read())

          lines = []
          for repo in repos[:4]:
              name = repo["name"]
              desc = repo.get("description") or ""
              url  = repo["html_url"]
              lang = repo.get("language") or ""
              lang_badge = f" `{lang}`" if lang else ""
              lines.append(f"- **[{name}]({url})**{lang_badge}  \n  {desc}")

          block = "\n".join(lines)
          readme = pathlib.Path("README.md").read_text()
          updated = re.sub(
              r"<!-- REPOS:START -->.*?<!-- REPOS:END -->",
              f"<!-- REPOS:START -->\n{block}\n<!-- REPOS:END -->",
              readme, flags=re.DOTALL
          )
          pathlib.Path("README.md").write_text(updated)
          print("✅ repos updated")
          PYEOF

      # ── 4. Commit everything ─────────────────────────────────────────────────
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily readme update [skip ci]"
          file_pattern: "README.md assets/tea.svg assets/research-vector.svg"
